<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HK Watchlist</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
      background: #0a0a0f;
      min-height: 100vh;
      color: #fff;
      overflow-x: hidden;
      font-size: 13px;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,200,150,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,200,150,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }

    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      pointer-events: none;
      animation: float 8s ease-in-out infinite;
    }
    .orb-1 { width: 300px; height: 300px; background: rgba(0,200,150,0.08); top: -100px; right: -100px; }
    .orb-2 { width: 200px; height: 200px; background: rgba(100,100,255,0.06); bottom: -50px; left: -50px; animation-delay: -4s; }
    @keyframes float {
      0%, 100% { transform: translate(0, 0) scale(1); }
      50% { transform: translate(-20px, 20px) scale(1.1); }
    }

    /* Header */
    .header {
      position: relative;
      z-index: 10;
      text-align: center;
      padding: 48px 24px 32px;
    }
    .header-back {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: rgba(255,255,255,0.4);
      text-decoration: none;
      font-size: 12px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 24px;
      transition: color 0.2s;
    }
    .header-back:hover { color: rgba(0,200,150,0.8); }
    .header-back svg { width: 16px; height: 16px; }
    .header h1 {
      font-size: 28px;
      font-weight: 300;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: rgba(0,200,150,0.9);
      margin-bottom: 8px;
    }
    .header p {
      font-size: 12px;
      color: rgba(255,255,255,0.35);
      letter-spacing: 0.05em;
    }
    .header .live-dot {
      display: inline-block;
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #00c896;
      margin-right: 6px;
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    /* Table container */
    .table-wrap {
      position: relative;
      z-index: 10;
      max-width: 900px;
      margin: 0 auto;
      padding: 0 24px 60px;
    }

    /* Column header row */
    .col-header {
      display: grid;
      grid-template-columns: 80px 1fr 90px 90px 90px 90px 100px;
      gap: 0;
      padding: 0 16px 10px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      margin-bottom: 4px;
    }
    .col-header span {
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.25);
    }
    .col-header .col-bf { color: rgba(255,180,0,0.6); }
    .col-header .col-wr { color: rgba(0,180,255,0.6); }
    .col-header .col-tf { color: rgba(180,100,255,0.6); }

    /* Stock rows */
    .stock-list {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .stock-row {
      display: grid;
      grid-template-columns: 80px 1fr 90px 90px 90px 90px 100px;
      align-items: center;
      gap: 0;
      background: rgba(255,255,255,0.025);
      border: 1px solid rgba(255,255,255,0.05);
      border-radius: 10px;
      padding: 12px 16px;
      transition: border-color 0.2s, transform 0.15s;
      cursor: default;
    }
    .stock-row:hover {
      border-color: rgba(255,255,255,0.1);
      transform: translateX(2px);
    }
    .stock-row.up { border-left: 2px solid rgba(0,200,150,0.4); }
    .stock-row.down { border-left: 2px solid rgba(255,80,80,0.4); }
    .stock-row.flat { border-left: 2px solid rgba(255,255,255,0.08); }

    /* Cells */
    .cell { display: flex; align-items: center; overflow: hidden; }

    .ticker-cell {
      flex-direction: column;
      align-items: flex-start;
      gap: 2px;
      white-space: nowrap;
      overflow: hidden;
      max-width: 100%;
    }
    .ticker-cell .code {
      font-size: 12px;
      font-weight: 600;
      color: rgba(255,255,255,0.8);
      letter-spacing: 0.02em;
      white-space: nowrap;
    }
    .ticker-cell .expiry {
      font-size: 10px;
      color: rgba(255,255,255,0.25);
      white-space: nowrap;
    }

    .stock-name {
      font-size: 12px;
      color: rgba(255,255,255,0.5);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      padding-right: 12px;
    }

    /* Signal cells */
    .sig-cell {
      justify-content: center;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.05em;
      padding: 0 4px;
    }
    .sig-bf { color: #ffb400; }
    .sig-wr { color: #00b4ff; }
    .sig-tf { color: #b464ff; }
    .sig-zero { color: rgba(255,255,255,0.15); }

    /* Price */
    .price-cell {
      font-size: 13px;
      font-weight: 500;
      color: rgba(255,255,255,0.8);
      justify-content: flex-end;
      padding-right: 8px;
    }

    /* Change % */
    .change-cell {
      justify-content: flex-end;
    }
    .change-badge {
      font-size: 12px;
      font-weight: 600;
      padding: 4px 9px;
      border-radius: 6px;
      min-width: 68px;
      text-align: center;
    }
    .change-badge.up {
      color: #00c896;
      background: rgba(0,200,150,0.1);
    }
    .change-badge.down {
      color: #ff5050;
      background: rgba(255,80,80,0.1);
    }
    .change-badge.flat {
      color: rgba(255,255,255,0.4);
      background: rgba(255,255,255,0.05);
    }

    /* Data source footer */
    .data-footer {
      position: relative;
      z-index: 10;
      text-align: center;
      padding: 20px 24px 40px;
      font-size: 10px;
      letter-spacing: 0.08em;
      color: rgba(255,255,255,0.15);
    }
    .data-footer .gs-icon {
      display: inline-block;
      width: 10px; height: 10px;
      background: rgba(0,200,150,0.3);
      border-radius: 2px;
      margin-right: 5px;
      vertical-align: middle;
    }

    @media (max-width: 700px) {
      .col-header { display: none; }
      .stock-row {
        grid-template-columns: 50px 1fr auto;
        grid-template-rows: auto auto;
      }
      .sig-header { display: none; }
      .name-cell { grid-column: 2; grid-row: 1; }
      .price-cell { display: none; }
      .change-cell { grid-column: 3; grid-row: 1; }
      .sigs-row {
        grid-column: 1 / -1;
        grid-row: 2;
        display: flex;
        gap: 8px;
        padding-top: 6px;
      }
    }
  </style>
</head>
<body>

  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>

  <div class="header">
    <a href="index2.html" class="header-back">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="15,18 9,12 15,6"/>
      </svg>
      Back to Menu
    </a>
    <h1><span class="live-dot"></span>HK Watchlist</h1>
    <p id="stockCount">17 stocks · Real-time via Google Sheets</p>
  </div>

  <div class="table-wrap">
    <!-- Column headers -->
    <div class="col-header">
      <span>Ticker</span>
      <span>Name</span>
      <span class="col-bf">D-0 BF</span>
      <span class="col-wr">D-0 WR</span>
      <span class="col-tf">D-0 TF</span>
      <span style="text-align:right">Price</span>
      <span style="text-align:right">Change %</span>
    </div>

    <!-- Stock rows -->
    <div class="stock-list" id="stockList"></div>
  </div>

  <div class="data-footer">
    <span class="gs-icon"></span>
    Data via Google Sheets · <span id="lastUpdated">Loading...</span>
  </div>

  <script>
    // ─────────────────────────────────────────────────────────────────
    // EMBEDDED FALLBACK DATA (from HK Watchlist tab, May 12 2026)
    // Update this array when pushing a new version without Apps Script
    // ─────────────────────────────────────────────────────────────────
    const FALLBACK_DATA = [
      { ticker: '0388', name: '港交所',      price: '423.8',  change: '-0.38%', bf: 5, wr: 3, tf: 5 },
      { ticker: '0700', name: '騰訊',        price: '457.2',  change: '-1.55%', bf: 6, wr: 0, tf: 2 },
      { ticker: '9992', name: '泡泡瑪特',    price: '162.9',  change: '-2.69%', bf: 6, wr: 0, tf: 3 },
      { ticker: '6869', name: '長飛光纖',    price: '271.2',  change: '+4.55%', bf: 6, wr: 3, tf: 4 },
      { ticker: '0836', name: '華潤電力',    price: '20.88',  change: '+1.75%', bf: 6, wr: 3, tf: 4 },
      { ticker: '2800', name: '盈富基金',    price: '26.48',  change: '-0.23%', bf: 5, wr: 3, tf: 3 },
      { ticker: '2823', name: '安碩A50',     price: '17.75',  change: '+0.74%', bf: 0, wr: 0, tf: 0 },
      { ticker: '1088', name: '中國神華',    price: '44.9',   change: '+0.40%', bf: 2, wr: 0, tf: 4 },
      { ticker: '3110', name: 'G.X. 恒生高股息率ETF', price: '33.6', change: '+0.18%', bf: 0, wr: 0, tf: 0 },
      { ticker: '3190', name: '富邦滬深港高股息', price: '18.11', change: '+0.33%', bf: 0, wr: 0, tf: 0 },
      { ticker: '7709', name: 'SK海力士X2', price: '91.98',  change: '-5.18%', bf: 6, wr: 6, tf: 5 },
      { ticker: '9880', name: '優必選',      price: '111',    change: '-2.20%', bf: 5, wr: 3, tf: 3 },
      { ticker: '0100', name: 'Minimax',     price: '690.5',  change: '-6.31%', bf: 2, wr: 0, tf: 2 },
      { ticker: '1024', name: '快手',        price: '52.6',   change: '+1.94%', bf: 6, wr: 7, tf: 5 },
      { ticker: '1810', name: '小米',        price: '31.46',  change: '-0.76%', bf: 9, wr: 0, tf: 3 },
      { ticker: '3690', name: '美團',        price: '84.15',  change: '-0.24%', bf: 7, wr: 3, tf: 3 },
      { ticker: '0020', name: '商湯',        price: '1.99',   change: '-1.97%', bf: 3, wr: 0, tf: 2 },
    ];

    // ─────────────────────────────────────────────────────────────────
    // APPS SCRIPT URL — replace with your deployed web app URL:
    // https://script.google.com/macros/s/{DEPLOYMENT_ID}/exec
    // Leave as placeholder → uses FALLBACK_DATA below
    // ─────────────────────────────────────────────────────────────────
    const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyhjeChlOT-7DKyGFAOJxXk0CbEVrnytni7C5UF1YRcW5DJSCeQwlJzsnPWVboFXV8hbA/exec';

    function parseChange(changeStr) {
      const num = parseFloat(changeStr.replace('%', '').replace('+', ''));
      return isNaN(num) ? 0 : num;
    }

    function sigClass(val) {
      return val === 0 ? 'sig-cell sig-zero' : 'sig-cell';
    }

    function changeClass(changeStr) {
      const num = parseChange(changeStr);
      if (num > 0) return 'change-badge up';
      if (num < 0) return 'change-badge down';
      return 'change-badge flat';
    }

    function rowClass(changeStr) {
      const num = parseChange(changeStr);
      if (num > 0) return 'stock-row up';
      if (num < 0) return 'stock-row down';
      return 'stock-row flat';
    }

    function renderRow(s) {
      const changeStr = s.change;
      return `
        <div class="${rowClass(changeStr)}">
          <div class="cell ticker-cell">
            <span class="code">${s.ticker}.HK</span>
          </div>
          <div class="cell stock-name">${s.name}</div>
          <div class="${sigClass(s.bf)} sig-bf">${s.bf}</div>
          <div class="${sigClass(s.wr)} sig-wr">${s.wr}</div>
          <div class="${sigClass(s.tf)} sig-tf">${s.tf}</div>
          <div class="cell price-cell">HK$${s.price}</div>
          <div class="cell change-cell">
            <span class="${changeClass(changeStr)}">${changeStr}</span>
          </div>
        </div>
      `;
    }

    function render(stocks) {
      document.getElementById('stockList').innerHTML =
        stocks.map(renderRow).join('');
      document.getElementById('stockCount').textContent =
        stocks.length + ' stocks · Real-time via Google Sheets';
    }

    function updateTimestamp() {
      const now = new Date();
      document.getElementById('lastUpdated').textContent =
        'Updated ' + now.toLocaleTimeString('en-HK', { timeZone: 'Asia/Hong_Kong' });
    }

    // ── Try Apps Script, fall back to embedded data ──────────────────
    async function loadData() {
      if (APPS_SCRIPT_URL === 'YOUR_APPS_SCRIPT_URL_HERE') {
        // No URL configured — use embedded data
        render(FALLBACK_DATA);
        updateTimestamp();
        return;
      }

      try {
        const resp = await fetch(APPS_SCRIPT_URL);
        if (!resp.ok) throw new Error('HTTP ' + resp.status);
        const data = await resp.json();
        if (Array.isArray(data) && data.length > 0) {
          render(data);
        } else {
          throw new Error('Empty or invalid response');
        }
      } catch (e) {
        console.warn('[HK Watchlist] Apps Script unavailable, using fallback data.', e.message);
        render(FALLBACK_DATA);
      } finally {
        updateTimestamp();
      }
    }

    loadData();
  </script>

</body>
</html>
