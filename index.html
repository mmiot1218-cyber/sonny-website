<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>🔒 Access</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
      background: #0a0a0f;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      overflow: hidden;
    }

    /* Animated background grid */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,200,150,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,200,150,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }

    /* Glow orbs */
    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      pointer-events: none;
      animation: float 8s ease-in-out infinite;
    }
    .orb-1 { width: 300px; height: 300px; background: rgba(0,200,150,0.08); top: -100px; right: -100px; }
    .orb-2 { width: 200px; height: 200px; background: rgba(100,100,255,0.06); bottom: -50px; left: -50px; animation-delay: -4s; }
    @keyframes float {
      0%, 100% { transform: translate(0, 0) scale(1); }
      50% { transform: translate(-20px, 20px) scale(1.1); }
    }

    .pin-gate {
      position: relative;
      z-index: 10;
      text-align: center;
      padding: 40px 32px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 24px;
      backdrop-filter: blur(20px);
      min-width: 340px;
      box-shadow: 0 24px 60px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.05);
    }

    /* Header */
    .pin-header { margin-bottom: 32px; }
    .pin-icon { font-size: 28px; margin-bottom: 12px; }
    .pin-title {
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.5);
    }
    .pin-subtitle {
      font-size: 11px;
      color: rgba(255,255,255,0.25);
      margin-top: 6px;
      letter-spacing: 0.05em;
    }

    /* PIN Display — LED style */
    .pin-display {
      display: flex;
      justify-content: center;
      gap: 14px;
      margin-bottom: 28px;
    }
    .pin-dot {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: rgba(255,255,255,0.1);
      border: 2px solid rgba(255,255,255,0.15);
      transition: all 0.15s ease;
    }
    .pin-dot.filled {
      background: rgba(0,200,150,0.9);
      border-color: rgba(0,200,150,1);
      box-shadow: 0 0 12px rgba(0,200,150,0.5), 0 0 24px rgba(0,200,150,0.2);
    }
    .pin-dot.error {
      background: rgba(255,60,60,0.9);
      border-color: rgba(255,60,60,1);
      box-shadow: 0 0 12px rgba(255,60,60,0.5);
    }
    .pin-dot.success {
      background: rgba(0,255,130,0.9);
      border-color: rgba(0,255,130,1);
      box-shadow: 0 0 12px rgba(0,255,130,0.5);
    }

    /* Error message */
    .pin-error {
      height: 18px;
      font-size: 11px;
      color: #ff6060;
      letter-spacing: 0.05em;
      margin-bottom: 16px;
      opacity: 0;
      transition: opacity 0.3s ease;
    }
    .pin-error.show { opacity: 1; }

    /* ===== ATM Visual Numpad ===== */
    .numpad {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      max-width: 240px;
      margin: 0 auto 10px;
    }
    .numpad-btn {
      width: 68px;
      height: 58px;
      border: none;
      border-radius: 14px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      color: #fff;
      font-size: 22px;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.12s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      position: relative;
      overflow: hidden;
    }
    /* Subtle inner glow on press */
    .numpad-btn::after {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at center, rgba(0,200,150,0.2) 0%, transparent 70%);
      opacity: 0;
      transition: opacity 0.1s;
    }
    .numpad-btn:hover {
      background: rgba(255,255,255,0.1);
      border-color: rgba(255,255,255,0.15);
      transform: translateY(-1px);
    }
    .numpad-btn:active {
      transform: scale(0.94);
      background: rgba(0,200,150,0.12);
      border-color: rgba(0,200,150,0.3);
    }
    .numpad-btn:active::after { opacity: 1; }

    /* Bottom row: empty + 0 + backspace */
    .numpad-row-4 {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      max-width: 240px;
      margin: 0 auto;
    }
    .numpad-btn.clear { font-size: 13px; letter-spacing: 0.05em; color: rgba(255,255,255,0.4); }
    .numpad-btn.clear:hover { color: #ff6060; border-color: rgba(255,80,80,0.3); }
    .numpad-btn.backspace { font-size: 18px; }
    .numpad-btn.backspace:hover { color: #ff9060; }
    .numpad-btn.empty {
      background: transparent;
      border-color: transparent;
      cursor: default;
      pointer-events: none;
    }
    .numpad-btn.zero { font-size: 22px; }

    /* Success animation */
    @keyframes success-flash {
      0% { opacity: 0; }
      30% { opacity: 1; }
      100% { opacity: 0; }
    }
    .success-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,200,150,0.1);
      pointer-events: none;
      z-index: 100;
      display: none;
    }
    .success-overlay.show { display: block; animation: success-flash 0.6s ease forwards; }

    /* Shake animation */
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20% { transform: translateX(-10px); }
      40% { transform: translateX(10px); }
      60% { transform: translateX(-6px); }
      80% { transform: translateX(6px); }
    }
    .shake { animation: shake 0.4s ease; }
  </style>
</head>
<body>

  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="success-overlay" id="successOverlay"></div>

  <div class="pin-gate" id="pinGate">
    <div class="pin-header">
      <div class="pin-icon">🔐</div>
      <div class="pin-title">Enter Access PIN</div>
      <div class="pin-subtitle">Contact owner for access</div>
    </div>

    <!-- LED dots -->
    <div class="pin-display" id="pinDisplay">
      <div class="pin-dot" id="dot0"></div>
      <div class="pin-dot" id="dot1"></div>
      <div class="pin-dot" id="dot2"></div>
      <div class="pin-dot" id="dot3"></div>
      <div class="pin-dot" id="dot4"></div>
      <div class="pin-dot" id="dot5"></div>
    </div>

    <div class="pin-error" id="pinError">Incorrect PIN — try again</div>

    <!-- ATM Visual Numpad (layout randomized on load) -->
    <div class="numpad" id="numpadTop"></div>
    <div class="numpad-row-4" id="numpadBottom"></div>
  </div>

  <script>
    // ========== CONFIG ==========
    const CORRECT_PIN = '091218';
    const MAX_DIGITS = 6;

    let entered = '';

    // ========== ATM VISUAL — RANDOMIZED LAYOUT ==========
    // Fisher-Yates shuffle
    function shuffle(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function buildNumpad() {
      // Shuffle digits 1-9 for randomized visual layout
      const shuffled = shuffle([1, 2, 3, 4, 5, 6, 7, 8, 9]);

      const topRow = shuffled.slice(0, 3);
      const midRow = shuffled.slice(3, 6);
      const botRow = shuffled.slice(6, 9);

      // Top 3 rows (1-9)
      const allRows = [topRow, midRow, botRow];
      const topContainer = document.getElementById('numpadTop');
      const botContainer = document.getElementById('numpadBottom');

      topContainer.innerHTML = '';
      botContainer.innerHTML = '';

      allRows.forEach(row => {
        row.forEach(digit => {
          const btn = document.createElement('button');
          btn.className = 'numpad-btn';
          btn.textContent = digit;
          btn.addEventListener('click', () => handleInput(digit));
          topContainer.appendChild(btn);
        });
      });

      // Bottom row: empty | 0 | backspace
      // Add 0 digit to the pool too (so 0 appears once)
      const zeroBtn = document.createElement('button');
      zeroBtn.className = 'numpad-btn zero';
      zeroBtn.textContent = '0';
      zeroBtn.addEventListener('click', () => handleInput(0));

      const bsBtn = document.createElement('button');
      bsBtn.className = 'numpad-btn backspace';
      bsBtn.textContent = '⌫';
      bsBtn.addEventListener('click', handleBackspace);

      const emptyBtn = document.createElement('button');
      emptyBtn.className = 'numpad-btn empty';

      botContainer.appendChild(emptyBtn);
      botContainer.appendChild(zeroBtn);
      botContainer.appendChild(bsBtn);
    }

    // ========== INPUT HANDLERS ==========
    function handleInput(digit) {
      if (entered.length >= MAX_DIGITS) return;
      entered += digit;
      updateDisplay();
    }

    function handleBackspace() {
      if (entered.length === 0) return;
      entered = entered.slice(0, -1);
      updateDisplay();
    }

    function handleClear() {
      entered = '';
      updateDisplay();
      clearError();
    }

    function updateDisplay() {
      for (let i = 0; i < MAX_DIGITS; i++) {
        const dot = document.getElementById('dot' + i);
        dot.className = 'pin-dot' + (i < entered.length ? ' filled' : '');
      }
    }

    function clearError() {
      const errEl = document.getElementById('pinError');
      errEl.classList.remove('show');
      document.querySelectorAll('.pin-dot').forEach(d => d.classList.remove('error'));
    }

    function showError(msg) {
      const errEl = document.getElementById('pinError');
      errEl.textContent = msg;
      errEl.classList.add('show');
      document.getElementById('pinGate').classList.add('shake');
      document.querySelectorAll('.pin-dot').forEach(dot => dot.classList.add('error'));
      setTimeout(() => {
        document.getElementById('pinGate').classList.remove('shake');
      }, 400);
      entered = '';
      updateDisplay();
    }

    // ========== VERIFY ==========
    function verify() {
      if (entered.length !== MAX_DIGITS) return;

      if (entered === CORRECT_PIN) {
        // Success
        document.querySelectorAll('.pin-dot').forEach(d => d.classList.add('success'));
        document.getElementById('successOverlay').classList.add('show');
        setTimeout(() => {
          window.location.href = 'index2.html';
        }, 600);
      } else {
        showError('Incorrect PIN — try again');
      }
    }

    // ========== AUTO-SUBMIT on 6 digits ==========
    // Watch entered length and auto-verify when 6 reached
    const origHandleInput = handleInput;
    handleInput = function(digit) {
      if (entered.length >= MAX_DIGITS) return;
      clearError();
      entered += digit;
      updateDisplay();
      if (entered.length === MAX_DIGITS) {
        // Small delay so last dot fills visually first
        setTimeout(verify, 120);
      }
    };

    // ========== KEYBOARD SUPPORT ==========
    document.addEventListener('keydown', (e) => {
      if (document.getElementById('content') && document.getElementById('content').classList.contains('unlocked')) return;
      if (e.key >= '0' && e.key <= '9') {
        handleInput(parseInt(e.key));
      } else if (e.key === 'Backspace') {
        handleBackspace();
      } else if (e.key === 'Escape' || e.key === 'c' || e.key === 'C') {
        handleClear();
      } else if (e.key === 'Enter' && entered.length === MAX_DIGITS) {
        verify();
      }
    });

    // ========== INIT ==========
    buildNumpad();
  </script>
</body>
</html>
