<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>🔒 Access</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
      background: #0a0a0f;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      overflow: hidden;
    }

    /* Animated background grid */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,200,150,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,200,150,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }

    /* Glow orbs */
    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      pointer-events: none;
      animation: float 8s ease-in-out infinite;
    }
    .orb-1 { width: 300px; height: 300px; background: rgba(0,200,150,0.08); top: -100px; right: -100px; }
    .orb-2 { width: 200px; height: 200px; background: rgba(100,100,255,0.06); bottom: -50px; left: -50px; animation-delay: -4s; }
    @keyframes float {
      0%, 100% { transform: translate(0, 0) scale(1); }
      50% { transform: translate(-20px, 20px) scale(1.1); }
    }

    .pin-gate {
      position: relative;
      z-index: 10;
      text-align: center;
      padding: 40px 32px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 24px;
      backdrop-filter: blur(20px);
      min-width: 340px;
      box-shadow: 0 24px 60px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.05);
    }

    /* Header */
    .pin-header { margin-bottom: 32px; }
    .pin-icon { font-size: 28px; margin-bottom: 12px; }
    .pin-title {
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.5);
    }
    .pin-subtitle {
      font-size: 11px;
      color: rgba(255,255,255,0.25);
      margin-top: 6px;
      letter-spacing: 0.05em;
    }

    /* PIN Display — LED style */
    .pin-display {
      display: flex;
      justify-content: center;
      gap: 14px;
      margin-bottom: 28px;
    }
    .pin-dot {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: rgba(255,255,255,0.1);
      border: 2px solid rgba(255,255,255,0.15);
      transition: all 0.15s ease;
    }
    .pin-dot.filled {
      background: rgba(0,200,150,0.9);
      border-color: rgba(0,200,150,1);
      box-shadow: 0 0 12px rgba(0,200,150,0.5), 0 0 24px rgba(0,200,150,0.2);
    }
    .pin-dot.error {
      background: rgba(255,60,60,0.9);
      border-color: rgba(255,60,60,1);
      box-shadow: 0 0 12px rgba(255,60,60,0.5);
    }
    .pin-dot.success {
      background: rgba(0,255,130,0.9);
      border-color: rgba(0,255,130,1);
      box-shadow: 0 0 12px rgba(0,255,130,0.5);
    }

    /* Error message */
    .pin-error {
      height: 18px;
      font-size: 11px;
      color: #ff6060;
      letter-spacing: 0.05em;
      margin-bottom: 16px;
      opacity: 0;
      transition: opacity 0.3s ease;
    }
    .pin-error.show { opacity: 1; }

    /* Numpad */
    .numpad {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      max-width: 240px;
      margin: 0 auto 20px;
    }
    .numpad-btn {
      width: 68px;
      height: 58px;
      border: none;
      border-radius: 14px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      color: #fff;
      font-size: 22px;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.12s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      position: relative;
      overflow: hidden;
    }
    .numpad-btn:hover {
      background: rgba(255,255,255,0.1);
      border-color: rgba(255,255,255,0.15);
    }
    .numpad-btn:active {
      transform: scale(0.94);
      background: rgba(0,200,150,0.15);
      border-color: rgba(0,200,150,0.3);
    }
    .numpad-btn.clear { font-size: 13px; letter-spacing: 0.05em; color: rgba(255,255,255,0.4); }
    .numpad-btn.clear:hover { color: #ff6060; }
    .numpad-btn.backspace { font-size: 18px; }
    .numpad-btn.backspace:hover { color: #ff9060; }

    /* Bottom row: empty + 0 + backspace */
    .numpad-row-4 {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      max-width: 240px;
      margin: 0 auto;
    }

    /* Remember me */
    .remember-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: 20px;
    }
    .remember-row label {
      font-size: 11px;
      color: rgba(255,255,255,0.3);
      cursor: pointer;
      user-select: none;
      letter-spacing: 0.05em;
    }
    .toggle {
      width: 36px;
      height: 20px;
      background: rgba(255,255,255,0.1);
      border-radius: 10px;
      cursor: pointer;
      position: relative;
      transition: background 0.2s;
    }
    .toggle.on { background: rgba(0,200,150,0.4); }
    .toggle::after {
      content: '';
      position: absolute;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #fff;
      top: 3px;
      left: 3px;
      transition: transform 0.2s;
    }
    .toggle.on::after { transform: translateX(16px); }

    /* Shake animation */
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20% { transform: translateX(-10px); }
      40% { transform: translateX(10px); }
      60% { transform: translateX(-6px); }
      80% { transform: translateX(6px); }
    }
    .shake { animation: shake 0.4s ease; }

    /* Success animation */
    @keyframes success-flash {
      0% { opacity: 0; }
      30% { opacity: 1; }
      100% { opacity: 0; }
    }
    .success-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,200,150,0.1);
      pointer-events: none;
      z-index: 100;
      display: none;
    }
    .success-overlay.show { display: block; animation: success-flash 0.6s ease forwards; }

    /* Content (hidden by default) */
    #content { display: none; padding: 20px; }
    #content.unlocked { display: block; }
    #content h1 { color: #00c896; font-size: 28px; margin-bottom: 16px; }
    #content p { color: rgba(255,255,255,0.6); font-size: 14px; line-height: 1.8; }
    #content .badge {
      display: inline-block;
      padding: 6px 16px;
      background: rgba(0,200,150,0.15);
      border: 1px solid rgba(0,200,150,0.3);
      border-radius: 100px;
      font-size: 11px;
      color: #00c896;
      letter-spacing: 0.1em;
      margin-bottom: 20px;
    }

    /* Settings cog */
    .settings-btn {
      position: fixed;
      bottom: 20px;
      right: 20px;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      color: rgba(255,255,255,0.3);
      font-size: 18px;
      cursor: pointer;
      display: none;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      z-index: 50;
    }
    .settings-btn:hover { background: rgba(255,255,255,0.1); color: #fff; }
    .settings-btn.show { display: flex; }

    /* Change PIN modal */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.8);
      backdrop-filter: blur(8px);
      z-index: 200;
      display: none;
      align-items: center;
      justify-content: center;
    }
    .modal-overlay.show { display: flex; }
    .modal {
      background: rgba(20,20,28,0.95);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px;
      padding: 32px;
      min-width: 300px;
      text-align: left;
    }
    .modal h3 { font-size: 13px; letter-spacing: 0.15em; text-transform: uppercase; color: rgba(255,255,255,0.5); margin-bottom: 20px; }
    .modal-field { margin-bottom: 12px; }
    .modal-field label { font-size: 11px; color: rgba(255,255,255,0.4); display: block; margin-bottom: 6px; }
    .modal-field input {
      width: 100%;
      padding: 10px 14px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      color: #fff;
      font-family: inherit;
      font-size: 14px;
      outline: none;
    }
    .modal-field input:focus { border-color: rgba(0,200,150,0.5); }
    .modal-actions { display: flex; gap: 10px; margin-top: 20px; }
    .modal-btn {
      flex: 1;
      padding: 10px;
      border-radius: 10px;
      border: none;
      font-family: inherit;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .modal-btn.cancel { background: rgba(255,255,255,0.05); color: rgba(255,255,255,0.5); }
    .modal-btn.cancel:hover { background: rgba(255,255,255,0.1); color: #fff; }
    .modal-btn.save { background: rgba(0,200,150,0.2); color: #00c896; border: 1px solid rgba(0,200,150,0.3); }
    .modal-btn.save:hover { background: rgba(0,200,150,0.3); }
    .modal-msg { font-size: 11px; margin-top: 10px; text-align: center; min-height: 16px; }
    .modal-msg.error { color: #ff6060; }
    .modal-msg.ok { color: #00c896; }
  </style>
</head>
<body>

  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="success-overlay" id="successOverlay"></div>

  <!-- PIN Gate -->
  <div class="pin-gate" id="pinGate">
    <div class="pin-header">
      <div class="pin-icon">🔐</div>
      <div class="pin-title">Enter Access PIN</div>
      <div class="pin-subtitle">Contact owner for access</div>
    </div>

    <!-- LED dots -->
    <div class="pin-display" id="pinDisplay">
      <div class="pin-dot" id="dot0"></div>
      <div class="pin-dot" id="dot1"></div>
      <div class="pin-dot" id="dot2"></div>
      <div class="pin-dot" id="dot3"></div>
      <div class="pin-dot" id="dot4"></div>
      <div class="pin-dot" id="dot5"></div>
    </div>

    <div class="pin-error" id="pinError">Incorrect PIN — try again</div>

    <!-- Numpad -->
    <div class="numpad">
      <button class="numpad-btn" onclick="digit(1)">1</button>
      <button class="numpad-btn" onclick="digit(2)">2</button>
      <button class="numpad-btn" onclick="digit(3)">3</button>
      <button class="numpad-btn" onclick="digit(4)">4</button>
      <button class="numpad-btn" onclick="digit(5)">5</button>
      <button class="numpad-btn" onclick="digit(6)">6</button>
      <button class="numpad-btn" onclick="digit(7)">7</button>
      <button class="numpad-btn" onclick="digit(8)">8</button>
      <button class="numpad-btn" onclick="digit(9)">9</button>
    </div>
    <div class="numpad-row-4">
      <button class="numpad-btn clear" onclick="clearAll()">CLEAR</button>
      <button class="numpad-btn" onclick="digit(0)">0</button>
      <button class="numpad-btn backspace" onclick="backspace()">⌫</button>
    </div>

    <!-- Remember me -->
    <div class="remember-row">
      <div class="toggle" id="rememberToggle" onclick="toggleRemember()"></div>
      <label onclick="toggleRemember()">Remember this device</label>
    </div>
  </div>

  <!-- Content (unlocked view) -->
  <div id="content">
    <div class="badge">🔓 UNLOCKED</div>
    <h1>Hello World</h1>
    <p>Your site content goes here. Edit <code>index.html</code> to build your page.</p>
    <p style="margin-top:12px; color:rgba(255,255,255,0.3); font-size:12px;">Last unlocked: <span id="lastTime">-</span></p>
  </div>

  <!-- Settings -->
  <button class="settings-btn" id="settingsBtn" onclick="showModal()">⚙</button>

  <!-- Change PIN Modal -->
  <div class="modal-overlay" id="modal">
    <div class="modal">
      <h3>Change PIN</h3>
      <div class="modal-field">
        <label>Current PIN</label>
        <input type="password" id="oldPin" maxlength="6" inputmode="numeric" pattern="[0-9]*" autocomplete="off">
      </div>
      <div class="modal-field">
        <label>New PIN (4–6 digits)</label>
        <input type="password" id="newPin" maxlength="6" inputmode="numeric" pattern="[0-9]*" autocomplete="off">
      </div>
      <div class="modal-field">
        <label>Confirm New PIN</label>
        <input type="password" id="confirmPin" maxlength="6" inputmode="numeric" pattern="[0-9]*" autocomplete="off">
      </div>
      <div class="modal-msg" id="modalMsg"></div>
      <div class="modal-actions">
        <button class="modal-btn cancel" onclick="hideModal()">Cancel</button>
        <button class="modal-btn save" onclick="saveNewPin()">Save</button>
      </div>
    </div>
  </div>

  <script>
    // ========== CONFIG ==========
    const DEFAULT_PIN = '1234';  // Change this default PIN!
    const MAX_DIGITS = 6;
    const PIN_COOKIE_KEY = 'pin_token';
    const PIN_HASH_KEY = 'pin_hash';
    const REMEMBER_KEY = 'pin_remember';

    let entered = '';

    // ========== PIN STORAGE (simple hash) ==========
    async function sha256(str) {
      const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
      return btoa(String.fromCharCode(...new Uint8Array(buf)));
    }

    async function getStoredHash() {
      const stored = localStorage.getItem(PIN_HASH_KEY);
      return stored || null;
    }

    async function savePinHash(pin) {
      const hash = await sha256(pin);
      localStorage.setItem(PIN_HASH_KEY, hash);
      return hash;
    }

    async function getExpectedHash() {
      const stored = await getStoredHash();
      if (stored) return stored;
      // First time: use default PIN
      return await sha256(DEFAULT_PIN);
    }

    // ========== UI ==========
    function updateDisplay() {
      for (let i = 0; i < MAX_DIGITS; i++) {
        const dot = document.getElementById('dot' + i);
        dot.className = 'pin-dot' + (i < entered.length ? ' filled' : '');
      }
    }

    function clearError() {
      const errEl = document.getElementById('pinError');
      errEl.classList.remove('show');
      document.querySelectorAll('.pin-dot').forEach(d => {
        d.classList.remove('error');
      });
    }

    function showError(msg) {
      const errEl = document.getElementById('pinError');
      errEl.textContent = msg;
      errEl.classList.add('show');
      document.getElementById('pinGate').classList.add('shake');
      document.querySelectorAll('.pin-dot').forEach(dot => {
        dot.classList.add('error');
      });
      setTimeout(() => {
        document.getElementById('pinGate').classList.remove('shake');
      }, 400);
      entered = '';
      updateDisplay();
    }

    function digit(n) {
      if (entered.length >= MAX_DIGITS) return;
      clearError();
      entered += n;
      updateDisplay();
      if (entered.length >= 4) {
        // Auto-submit when 4+ digits entered
      }
    }

    function backspace() {
      if (entered.length === 0) return;
      clearError();
      entered = entered.slice(0, -1);
      updateDisplay();
    }

    function clearAll() {
      entered = '';
      clearError();
      updateDisplay();
    }

    // ========== VERIFY ==========
    async function verify() {
      const expected = await getExpectedHash();
      const input = await sha256(entered);

      if (input === expected) {
        // Success!
        document.querySelectorAll('.pin-dot').forEach(d => d.classList.add('success'));
        document.getElementById('successOverlay').classList.add('show');

        // Save remember token if toggled on
        if (document.getElementById('rememberToggle').classList.contains('on')) {
          const token = btoa(entered + ':' + Date.now());
          localStorage.setItem(PIN_COOKIE_KEY, token);
          localStorage.setItem(REMEMBER_KEY, '1');
        }

        setTimeout(() => {
          unlockSite();
        }, 500);
      } else {
        showError('Incorrect PIN — try again');
      }
    }

    function unlockSite() {
      document.getElementById('pinGate').style.display = 'none';
      document.getElementById('content').classList.add('unlocked');
      document.getElementById('settingsBtn').classList.add('show');
      document.getElementById('lastTime').textContent = new Date().toLocaleString();
      entered = '';
    }

    // ========== AUTO-UNLOCK (remember device) ==========
    async function checkAutoUnlock() {
      const token = localStorage.getItem(PIN_COOKIE_KEY);
      const rememberOn = localStorage.getItem(REMEMBER_KEY);
      if (token && rememberOn === '1') {
        // Validate stored hash still matches
        const storedHash = await getStoredHash();
        const expectedHash = await getExpectedHash();
        if (storedHash === expectedHash) {
          unlockSite();
          return;
        }
        // Hash changed — clear token
        localStorage.removeItem(PIN_COOKIE_KEY);
      }
      // Restore remember toggle state
      if (rememberOn === '1') {
        document.getElementById('rememberToggle').classList.add('on');
      }
    }

    // ========== REMEMBER TOGGLE ==========
    function toggleRemember() {
      document.getElementById('rememberToggle').classList.toggle('on');
    }

    // ========== CHANGE PIN ==========
    function showModal() {
      document.getElementById('modal').classList.add('show');
      document.getElementById('oldPin').value = '';
      document.getElementById('newPin').value = '';
      document.getElementById('confirmPin').value = '';
      document.getElementById('modalMsg').textContent = '';
      document.getElementById('oldPin').focus();
    }

    function hideModal() {
      document.getElementById('modal').classList.remove('show');
    }

    async function saveNewPin() {
      const old = document.getElementById('oldPin').value;
      const newP = document.getElementById('newPin').value;
      const confirm = document.getElementById('confirmPin').value;
      const msg = document.getElementById('modalMsg');

      if (!old || !newP || !confirm) {
        msg.textContent = 'Fill in all fields';
        msg.className = 'modal-msg error';
        return;
      }
      if (!/^\d{4,6}$/.test(newP)) {
        msg.textContent = 'PIN must be 4–6 digits';
        msg.className = 'modal-msg error';
        return;
      }
      if (newP !== confirm) {
        msg.textContent = 'PINs do not match';
        msg.className = 'modal-msg error';
        return;
      }

      // Verify old PIN
      const expectedHash = await getExpectedHash();
      const oldHash = await sha256(old);
      if (oldHash !== expectedHash) {
        msg.textContent = 'Current PIN is wrong';
        msg.className = 'modal-msg error';
        return;
      }

      // Save new PIN
      await savePinHash(newP);
      // Invalidate old device tokens
      localStorage.removeItem(PIN_COOKIE_KEY);

      msg.textContent = '✅ PIN updated!';
      msg.className = 'modal-msg ok';
      setTimeout(hideModal, 1200);
    }

    // ========== KEYBOARD SUPPORT ==========
    document.addEventListener('keydown', (e) => {
      if (document.getElementById('modal').classList.contains('show')) return;
      if (document.getElementById('content').classList.contains('unlocked')) return;

      if (e.key >= '0' && e.key <= '9') digit(e.key);
      else if (e.key === 'Backspace') backspace();
      else if (e.key === 'Escape' || e.key === 'c' || e.key === 'C') clearAll();
      else if (e.key === 'Enter') verify();
    });

    // ========== INIT ==========
    checkAutoUnlock();
  </script>

</body>
</html>
